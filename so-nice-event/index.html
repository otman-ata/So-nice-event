<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>So Nice Event - Wedding & Event Planner</title>
    <link rel="icon" type="image/png" href="/assets/logos/main-logo.png" />
    <link rel="apple-touch-icon" href="/assets/logos/main-logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --color-primary: #76121d;
        --color-primary-hover: #9a1f2d;
        --color-accent: #d9a629;
        --color-gold-soft: #f7d979;
        --color-terracotta: #b9532f;
        --color-earth: #7c4a2d;
        --color-cream: #fff4dc;
        --color-ink: #271b18;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: 'Montserrat', sans-serif;
        background:
          radial-gradient(circle at 18px 18px, rgba(217, 166, 41, .16) 2px, transparent 2.5px) 0 0 / 36px 36px,
          linear-gradient(180deg, #fffaf0 0%, var(--color-cream) 44%, #fff8ec 100%);
        color: var(--color-ink);
      }
      h1, h2, h3, h4, h5, h6, .font-serif {
        font-family: 'Playfair Display', serif;
      }
      .custom-bg {
        background:
          radial-gradient(circle at 12% 0%, rgba(247, 217, 121, .18), transparent 26%),
          linear-gradient(135deg, #4a0a12 0%, var(--color-primary) 48%, #8f1b24 100%);
        transition: background-color 0.3s ease;
      }
      .custom-bg:hover {
        background-color: var(--color-primary-hover);
      }
      .custom-text,
      .hover\:custom-text:hover {
        color: var(--color-primary);
      }
      .custom-text-dark {
        color: #450a0a;
      }
      .gold-bg {
        background-color: var(--color-accent);
      }
      .gold-text {
        color: var(--color-accent);
      }
      .moroccan-pattern {
        position: relative;
        overflow: hidden;
      }
      .moroccan-pattern::before {
        content: '';
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0.16;
        background-image:
          radial-gradient(circle at 50% 50%, rgba(118,18,29,.72) 0 2px, transparent 2.5px),
          linear-gradient(45deg, transparent 46%, rgba(217,166,41,.75) 47%, rgba(217,166,41,.75) 53%, transparent 54%),
          linear-gradient(-45deg, transparent 46%, rgba(185,83,47,.35) 47%, rgba(185,83,47,.35) 53%, transparent 54%);
        background-size: 38px 38px, 38px 38px, 38px 38px;
      }
      .section-inner {
        position: relative;
        z-index: 1;
      }
      .zellige-band {
        position: relative;
      }
      .zellige-band::after {
        content: '';
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 13px;
        background:
          linear-gradient(135deg, transparent 25%, rgba(217,166,41,.9) 25% 50%, transparent 50% 75%, rgba(217,166,41,.9) 75%) 0 0 / 26px 13px,
          linear-gradient(90deg, rgba(118,18,29,.85), rgba(185,83,47,.75), rgba(118,18,29,.85));
      }
      .moroccan-heading {
        position: relative;
        display: inline-block;
        padding: 0 1.5rem 1rem;
      }
      .moroccan-heading::after {
        content: '';
        position: absolute;
        left: 50%;
        bottom: 0;
        width: min(220px, 80%);
        height: 9px;
        transform: translateX(-50%);
        background:
          radial-gradient(circle at center, var(--color-accent) 0 4px, transparent 4.5px) center / 22px 9px repeat-x;
      }
      .moroccan-arch {
        clip-path: polygon(0 16%, 8% 16%, 8% 10%, 14% 10%, 14% 6%, 50% 0, 86% 6%, 86% 10%, 92% 10%, 92% 16%, 100% 16%, 100% 100%, 0 100%);
      }
      .tile-border {
        border: 1px solid rgba(217, 166, 41, .38);
        background:
          linear-gradient(#fffdf7, #fffdf7) padding-box,
          linear-gradient(135deg, rgba(217,166,41,.9), rgba(118,18,29,.55), rgba(185,83,47,.55)) border-box;
      }
      .lantern-glow {
        box-shadow: 0 18px 55px rgba(69, 10, 10, .18), inset 0 1px 0 rgba(255,255,255,.45);
      }
      .ornament-rule {
        height: 15px;
        background:
          radial-gradient(circle, rgba(217,166,41,.9) 0 4px, transparent 4.5px) center / 26px 15px repeat-x;
      }
      /* White header logo → warm gold when scrolled (no separate asset required) */
      .header-logo--gold {
        filter: brightness(0) saturate(100%) invert(78%) sepia(86%) saturate(607%) hue-rotate(350deg) brightness(99%) contrast(92%)
          drop-shadow(0 0 1px rgba(251, 191, 36, 0.35));
      }

      /* Accessibility: Add a clear focus indicator for keyboard users */
      :focus-visible {
        outline: 3px solid var(--color-primary-hover);
        outline-offset: 2px;
        border-radius: 2px;
      }

      /* Accessibility: Respect user preference for reduced motion */
      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto;
        }
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }

      /* Elegant Arabic typography */
      [lang="ar"] body,
      [lang="ar"] button,
      [lang="ar"] a,
      [lang="ar"] input,
      [lang="ar"] textarea,
      [lang="ar"] p,
      [lang="ar"] span,
      [lang="ar"] div,
      [lang="ar"] label {
        font-family: 'Noto Kufi Arabic', sans-serif;
        letter-spacing: 0;
      }
      [lang="ar"] h1,
      [lang="ar"] h2,
      [lang="ar"] h3,
      [lang="ar"] h4,
      [lang="ar"] h5,
      [lang="ar"] h6,
      [lang="ar"] .font-serif {
        font-family: 'Amiri', serif;
        letter-spacing: 0;
      }
      [lang="ar"] h1 {
        line-height: 1.15;
      }
      [lang="ar"] h2,
      [lang="ar"] h3 {
        line-height: 1.25;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module">
      async function boot() {
        try {
          // 1) Apply local overrides immediately for instant preview after admin uploads
          const ls = localStorage.getItem('site_images_override');
          if (ls) {
            try { window.__SITE_IMAGES = JSON.parse(ls); } catch(_) {}
          }
          // 2) Load cloud CMS data when available. Public content images are admin-managed only.
          const cmsRes = await fetch('/api/cms', { cache: 'no-cache' });
          if (cmsRes.ok) {
            const cmsData = await cmsRes.json();
            if (cmsData && cmsData.siteImages) {
              window.__SITE_IMAGES = Object.assign({}, window.__SITE_IMAGES || {}, cmsData.siteImages);
            }
            if (cmsData && Array.isArray(cmsData.gallery)) {
              window.__CMS = Object.assign({}, window.__CMS || {}, { galleryData: cmsData.gallery });
            }
          }
        } catch (e) {}
        await import('/index.tsx');
      }
      boot();
    </script>
    <style>
      /* Simple, reusable marquee styles */
      .marquee {
        position: relative;
        overflow: hidden;
        mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
        -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
      }
      .marquee__track {
        display: flex;
        width: max-content;
        animation: marquee-scroll 28s linear infinite;
      }
      .marquee:hover .marquee__track { animation-play-state: paused; }
      @keyframes marquee-scroll {
        from { transform: translateX(0); }
        to { transform: translateX(-50%); }
      }
    </style>
    <script>
      // This script helps manage the text direction for RTL languages like Arabic.
      const observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
          if (mutation.type === 'attributes' && mutation.attributeName === 'lang') {
            const newLang = document.documentElement.lang;
            if (newLang === 'ar') {
              document.documentElement.dir = 'rtl';
            } else {
              document.documentElement.dir = 'ltr';
            }
          }
        });
      });
      observer.observe(document.documentElement, {
        attributes: true
      });
    </script>
  </body>
</html>
