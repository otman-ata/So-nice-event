<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Gallery Manager (Private)</title>
  <style>
    :root { --primary:#8D555F; --border:#e5e5e5; --panel-bg:#fff; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, 'Helvetica Neue', Arial; margin:0; background:#f3f4f6; color:#222; }
    header { background: var(--primary); color:#fff; padding:16px 20px; }
    h1 { margin:0; font-size:20px; }
    main { padding:20px; max-width:960px; margin:0 auto; }
    .panel { background:var(--panel-bg); border:1px solid var(--border); border-radius:12px; padding:18px 20px; margin-bottom:18px; box-shadow:0 1px 3px rgba(0,0,0,.06); }
    .panel h2 { margin:0 0 12px; font-size:15px; letter-spacing:.02em; color:#374151; text-transform:uppercase; }
    .bar { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin:10px 0; }
    button, input, select { padding:10px 14px; border-radius:8px; border:1px solid #d1d5db; background:#fff; font-size:14px; }
    button { cursor:pointer; }
    button.primary { background:var(--primary); color:#fff; border-color:transparent; }
    button.secondary { background:#f9fafb; }
    button.danger { background:#dc2626; color:#fff; border-color:transparent; }
    button.tab { background:#fff; }
    button.tab.active { background:var(--primary); color:#fff; border-color:transparent; }
    .muted { color:#6b7280; font-size:13px; line-height:1.45; }
    .hidden { display:none !important; }
    .note { background:#fffbeb; border:1px solid #fcd34d; padding:12px; border-radius:8px; margin:12px 0; font-size:13px; }
    .share-card { background:#e8f4fc !important; border-color:#91d5ff !important; }
    .share-url { flex:1; padding:10px 12px; background:#fff; border:1px solid var(--border); border-radius:8px; font-size:13px; word-break:break-all; font-family: ui-monospace, monospace; }
    .gallery-grid { display:flex; flex-direction:column; gap:14px; }
    .media-card { display:flex; gap:16px; flex-wrap:wrap; padding:14px; border:1px solid var(--border); border-radius:10px; background:#fafafa; align-items:flex-start; }
    .media-thumb { flex-shrink:0; width:120px; height:90px; border-radius:8px; overflow:hidden; background:#e5e7eb; border:1px solid var(--border); display:flex; align-items:center; justify-content:center; }
    .media-thumb img { width:100%; height:100%; object-fit:cover; }
    .media-thumb .ph { font-size:11px; color:#9ca3af; padding:8px; text-align:center; }
    .media-main { flex:1; min-width:200px; }
    .field { margin-bottom:10px; }
    .field label { display:block; font-size:11px; font-weight:600; color:#6b7280; margin-bottom:4px; text-transform:uppercase; letter-spacing:.04em; }
    .field input[type="text"], .field input[type="number"] { width:100%; box-sizing:border-box; }
    .crud-actions { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
    .crud-actions button { font-size:13px; padding:8px 12px; }
    footer.page-ft { margin-top:24px; color:#6b7280; font-size:12px; }
  </style>
</head>
<body>
  <header>
    <h1 id="t_title">Gallery Manager (Private)</h1>
    <div class="muted" id="t_sub">Manage images by category and key site images.</div>
  </header>
  <main>
    <section id="gate">
      <div class="note share-card">
        <strong id="shareTitle">Share link for your team</strong>
        <p class="muted" id="shareHint" style="margin:8px 0;"></p>
        <div class="bar" style="margin:0;">
          <div id="shareUrlManage" class="share-url"></div>
          <button type="button" class="primary" id="copyShareManage">Copy</button>
        </div>
        <p class="muted" id="shareAltLine" style="margin:10px 0 0;font-size:12px;"></p>
      </div>
      <div class="note" id="t_gate">Enter passphrase to continue.</div>
      <div class="bar">
        <input id="pass" type="password" placeholder="Passphrase" />
        <button class="primary" id="enter">Enter</button>
        <select id="lang">
          <option value="en">EN</option>
          <option value="fr">FR</option>
          <option value="ar">AR</option>
        </select>
      </div>
    </section>

    <section id="app" class="hidden">
      <p id="roleBadge" class="muted" style="margin:0 0 14px;font-weight:600;"></p>

      <div class="panel" id="panelConn">
        <h2 id="sec_conn">Connection</h2>
        <p class="muted" id="serverHint"></p>
        <div class="bar" style="margin-top:0;">
          <label style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;flex:1;">
            <span id="lbl_server">Upload / save API URL</span>
            <input id="cms_server_input" type="url" placeholder="http://localhost:4000" style="min-width:200px;flex:1;" />
          </label>
          <button type="button" class="primary" id="cms_server_save">Save URL</button>
        </div>
      </div>

      <section id="superPanel" class="panel note hidden">
        <strong id="superPanelTitle">Super admin</strong>
        <p class="muted" id="superPanelBody"></p>
        <p class="muted" id="superPanelLinkRow"><span id="adminLinkLabel"></span> <a href="#" id="adminLink"></a></p>
      </section>

      <div class="panel" id="panelGallery">
        <h2 id="sec_gallery">Gallery — pictures</h2>
        <p class="muted" id="hintGallery"></p>

        <div class="bar" style="margin-bottom:6px;">
          <button type="button" class="tab" data-tab="Weddings" id="tab_w">Weddings</button>
          <button type="button" class="tab" data-tab="Private Events" id="tab_p">Private Events</button>
          <button type="button" class="tab" data-tab="Corporate Events" id="tab_c">Corporate Events</button>
          <button type="button" class="tab" data-tab="Site Images" id="tab_s">Site Images</button>
        </div>

        <div id="galleryControls">
          <div class="bar">
            <button type="button" class="primary" id="add">+ Add picture</button>
            <button type="button" class="secondary" id="reload">Reload from site</button>
            <button type="button" class="primary" id="saveGallery">Save</button>
            <button type="button" class="secondary" id="download">Download JSON</button>
            <button type="button" class="secondary" id="clearDraft">Clear preview</button>
          </div>
          <p class="muted" id="status"></p>
        </div>

        <div id="siteControls" class="hidden">
          <div class="bar">
            <button type="button" class="secondary" id="reloadSite">Reload</button>
            <button type="button" class="primary" id="saveSite">Save</button>
            <button type="button" class="secondary" id="downloadSite">Download JSON</button>
          </div>
        </div>

        <div class="note hidden" id="noteSite">Site-wide images (hero, services, logos).</div>

        <div id="galleryCards" class="gallery-grid"></div>

        <div id="siteForm" class="hidden">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;" class="site-grid">
            <label>Hero <input id="f_heroBg" type="text" /> <input type="file" data-up="heroBg" accept="image/*" /></label>
            <label>About <input id="f_aboutUs" type="text" /> <input type="file" data-up="aboutUs" accept="image/*" /></label>
            <label>Service Wedding <input id="f_serviceWedding" type="text" /> <input type="file" data-up="serviceWedding" accept="image/*" /></label>
            <label>Service Private <input id="f_servicePrivate" type="text" /> <input type="file" data-up="servicePrivate" accept="image/*" /></label>
            <label>Service Corporate <input id="f_serviceCorporate" type="text" /> <input type="file" data-up="serviceCorporate" accept="image/*" /></label>
            <label>Blog Palette <input id="f_blogPalette" type="text" /> <input type="file" data-up="blogPalette" accept="image/*" /></label>
            <label>Blog Negafa <input id="f_blogNegafa" type="text" /> <input type="file" data-up="blogNegafa" accept="image/*" /></label>
            <label>Blog Venues <input id="f_blogVenues" type="text" /> <input type="file" data-up="blogVenues" accept="image/*" /></label>
            <label>Blog Lanterns <input id="f_blogLanterns" type="text" /> <input type="file" data-up="blogLanterns" accept="image/*" /></label>
            <label>Logo Color <input id="f_logoColor" type="text" /> <input type="file" data-up="logoColor" accept="image/*" /></label>
            <label>Logo White <input id="f_logoWhite" type="text" /> <input type="file" data-up="logoWhite" accept="image/*" /></label>
          </div>
        </div>
      </div>

      <footer class="page-ft" id="t_footer"></footer>
    </section>
  </main>

  <style>@media(max-width:640px){ .site-grid { grid-template-columns:1fr !important; } }</style>

  <script>
    const PASSPHRASE_SUPER = 'soniceevent-admin';
    const PASSPHRASE_WORKER = 'soniceevent-staff';
    const DRAFT_KEY = 'so_nice_gallery_draft';

    let role = null;

    const T = {
      en: {
        title:'Gallery Manager (Private)', sub:'Simple CRUD for gallery and site images.', gate:'Enter passphrase (super admin or staff).', enter:'Enter', add:'+ Add picture', reload:'Reload from site', download:'Download', footer:'Production visitors see gallery.json until you deploy. This browser can preview drafts.', serverHint:'Local: run npm run cms and keep this URL. Vercel: use Save → download gallery.json → commit to repo.', badgeSuper:'Super admin — full access', badgeWorker:'Staff — gallery only', superTitle:'Super admin', superBody:'Staff passphrase: PASSPHRASE_WORKER in this file.', adminLinkLbl:'Admin URL:', wrong:'Wrong passphrase', lbl_server:'API URL', saveUrl:'Save URL', shareTitle:'Team link', shareHint:'Share after deploy. Staff still need their passphrase.', shareAlt:'Direct:', copyShare:'Copy', copiedMsg:'Copied.', sec_conn:'1 · Connection', sec_gallery:'2 · Gallery CRUD', hintGallery:'Replace = upload a file. Preview updates here and on the main site in this browser. Save = server or download JSON.', reloadConfirm:'Reload from server? This removes the unpublished draft in this browser.', clearDraftConfirm:'Clear preview draft?', draftSaved:'Draft saved. Refresh the homepage (same browser) to see changes.', saveDoneServer:'Saved on server.', saveDownload:'JSON downloaded. Put it in public/assets/gallery.json and deploy.', delConfirm:'Delete this picture?', btnReplace:'Replace', btnImport:'Import URL', btnUp:'↑ Up', btnDown:'↓ Down', btnDel:'Delete', clearDraft:'Clear preview', saveGallery:'Save',
      },
      fr: {
        title:'Gestionnaire de galerie', sub:'CRUD simple.', gate:'Phrase secrète.', enter:'Entrer', add:'+ Ajouter', reload:'Recharger', download:'Télécharger', footer:'Déployez gallery.json pour le public.', serverHint:'Local : npm run cms.', badgeSuper:'Super admin', badgeWorker:'Équipe', superTitle:'Super admin', superBody:'Mot de passe équipe dans ce fichier.', adminLinkLbl:'URL :', wrong:'Incorrect', lbl_server:'URL API', saveUrl:'OK', shareTitle:'Lien équipe', shareHint:'', shareAlt:'', copyShare:'Copier', copiedMsg:'Copié.', sec_conn:'1 · Connexion', sec_gallery:'2 · Galerie', hintGallery:'Remplacer = envoyer une image.', reloadConfirm:'Recharger depuis le serveur ?', clearDraftConfirm:'Effacer le brouillon ?', draftSaved:'Brouillon enregistré. Rafraîchir l’accueil.', saveDoneServer:'Enregistré sur le serveur.', saveDownload:'Fichier téléchargé → public/assets/gallery.json', delConfirm:'Supprimer ?', btnReplace:'Remplacer', btnImport:'Importer URL', btnUp:'↑', btnDown:'↓', btnDel:'Supprimer', clearDraft:'Effacer aperçu', saveGallery:'Enregistrer',
      },
      ar: {
        title:'مدير المعرض', sub:'', gate:'عبارة المرور.', enter:'دخول', add:'+ إضافة', reload:'تحديث', download:'تنزيل', footer:'', serverHint:'', badgeSuper:'مدير', badgeWorker:'فريق', superTitle:'', superBody:'', adminLinkLbl:'', wrong:'خطأ', lbl_server:'رابط API', saveUrl:'حفظ', shareTitle:'', shareHint:'', shareAlt:'', copyShare:'نسخ', copiedMsg:'تم.', sec_conn:'1 · الاتصال', sec_gallery:'2 · المعرض', hintGallery:'', reloadConfirm:'إعادة التحميل من الموقع؟', clearDraftConfirm:'مسح المسودة؟', draftSaved:'تم الحفظ. حدّث الصفحة الرئيسية.', saveDoneServer:'حُفظ على الخادم.', saveDownload:'تم التنزيل → gallery.json', delConfirm:'حذف؟', btnReplace:'استبدال', btnImport:'استيراد رابط', btnUp:'↑', btnDown:'↓', btnDel:'حذف', clearDraft:'مسح المعاينة', saveGallery:'حفظ',
      },
    };

    function txt(id, s){ const el=document.getElementById(id); if(el && s!=null) el.textContent=s; }
    function langDict(){ return T[lang.value] || T.en; }

    function refreshShareLinks(){
      const d = langDict();
      const o = window.location.origin;
      const box = document.getElementById('shareUrlManage');
      if (box) box.textContent = o + '/manage';
      const alt = document.getElementById('shareAltLine');
      if (alt) alt.textContent = (d.shareAlt || '') + ' ' + o + '/admin/gallery-manager.html';
    }

    function applyLang(){
      const d = langDict();
      txt('t_title', d.title); txt('t_sub', d.sub); txt('t_gate', d.gate); txt('enter', d.enter);
      txt('add', d.add); txt('reload', d.reload); txt('reloadSite', d.reload);
      txt('download', d.download + ' gallery.json'); txt('downloadSite', d.download + ' site-images.json');
      txt('t_footer', d.footer); txt('lbl_server', d.lbl_server); txt('cms_server_save', d.saveUrl);
      txt('serverHint', d.serverHint); txt('superPanelTitle', d.superTitle); txt('superPanelBody', d.superBody);
      txt('adminLinkLabel', d.adminLinkLabel); txt('shareTitle', d.shareTitle); txt('shareHint', d.shareHint);
      txt('copyShareManage', d.copyShare); txt('sec_conn', d.sec_conn); txt('sec_gallery', d.sec_gallery);
      txt('hintGallery', d.hintGallery); txt('saveGallery', d.saveGallery); txt('clearDraft', d.clearDraft);
      document.documentElement.dir = lang.value === 'ar' ? 'rtl' : 'ltr';
      applyRoleTexts(); refreshShareLinks();
    }

    function applyRoleTexts(){
      if (!role) return;
      const d = langDict();
      txt('roleBadge', role === 'super' ? d.badgeSuper : d.badgeWorker);
    }

    const data = { 'Weddings': [], 'Private Events': [], 'Corporate Events': [] };
    let site = {};
    let active = 'Weddings';

    const gate = document.getElementById('gate');
    const lang = document.getElementById('lang');

    applyLang();
    lang.onchange = () => applyLang();

    document.getElementById('copyShareManage').onclick = async () => {
      const url = window.location.origin + '/manage';
      try { await navigator.clipboard.writeText(url); alert(langDict().copiedMsg); }
      catch (_) { prompt(langDict().copyShare + ':', url); }
    };

    function mergeGalleryData() {
      return ['Weddings','Private Events','Corporate Events'].flatMap(c =>
        (data[c] || []).map(it => ({
          id: Number(it.id),
          src: String(it.src || '').trim(),
          category: c,
        }))
      );
    }

    function persistDraft() {
      try { localStorage.setItem(DRAFT_KEY, JSON.stringify(mergeGalleryData())); } catch (_) {}
      setStatus(langDict().draftSaved);
    }

    function clearDraftStore() {
      try { localStorage.removeItem(DRAFT_KEY); } catch (_) {}
    }

    function setStatus(s) {
      const el = document.getElementById('status');
      if (el) el.textContent = s || '';
    }

    function serverBase() {
      return (localStorage.getItem('cms_local_server') || 'http://localhost:4000').replace(/\/$/, '');
    }

    function readAsDataURL(file) {
      return new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result);
        r.onerror = rej;
        r.readAsDataURL(file);
      });
    }

    function applyRoleUI() {
      const tabSite = document.getElementById('tab_s');
      const superPanel = document.getElementById('superPanel');
      const link = document.getElementById('adminLink');
      if (role === 'worker') {
        tabSite.classList.add('hidden');
        superPanel.classList.add('hidden');
      } else {
        tabSite.classList.remove('hidden');
        superPanel.classList.remove('hidden');
        const manage = window.location.origin + '/manage';
        link.href = manage;
        link.textContent = manage;
      }
      applyRoleTexts();
    }

    function syncServerInput() {
      document.getElementById('cms_server_input').value =
        localStorage.getItem('cms_local_server') || 'http://localhost:4000';
    }

    document.getElementById('cms_server_save').onclick = () => {
      let v = document.getElementById('cms_server_input').value.trim().replace(/\/$/, '');
      if (!v) v = 'http://localhost:4000';
      localStorage.setItem('cms_local_server', v);
      alert('OK');
    };

    document.getElementById('enter').onclick = () => {
      const v = document.getElementById('pass').value.trim();
      if (v === PASSPHRASE_SUPER) role = 'super';
      else if (v === PASSPHRASE_WORKER) role = 'worker';
      else { alert(langDict().wrong); return; }
      gate.classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      syncServerInput();
      applyRoleUI();
      bindTabs();
      reloadAllInitial();
      bindUploads();
    };

    function bindTabs() {
      document.querySelectorAll('button.tab').forEach(btn => {
        btn.onclick = () => {
          document.querySelectorAll('button.tab').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          active = btn.getAttribute('data-tab');
          const isSite = active === 'Site Images';
          document.getElementById('galleryControls').classList.toggle('hidden', isSite);
          document.getElementById('galleryCards').classList.toggle('hidden', isSite);
          document.getElementById('siteControls').classList.toggle('hidden', !isSite);
          document.getElementById('noteSite').classList.toggle('hidden', !isSite);
          document.getElementById('siteForm').classList.toggle('hidden', !isSite);
          if (!isSite) renderGalleryCards();
          else renderSite();
        };
      });
      document.getElementById('tab_w').click();
    }

    async function reloadAllInitial() {
      await loadGallery({ preferDraft: true });
      await loadSite();
    }

    async function loadGallery(opts = {}) {
      const preferDraft = opts.preferDraft !== false;
      setStatus('Loading…');
      try {
        if (preferDraft) {
          let draft = null;
          try { draft = JSON.parse(localStorage.getItem(DRAFT_KEY) || ''); } catch (_) {}
          if (Array.isArray(draft) && draft.length) {
            ['Weddings','Private Events','Corporate Events'].forEach(c => {
              data[c] = draft.filter(i => i.category === c);
            });
            renderGalleryCards();
            setStatus('Draft loaded (this browser)');
            return;
          }
        }
        const r = await fetch('/assets/gallery.json', { cache: 'no-cache' });
        if (r.ok) {
          const arr = await r.json();
          ['Weddings','Private Events','Corporate Events'].forEach(c => {
            data[c] = arr.filter(i => i.category === c);
          });
        }
        renderGalleryCards();
        setStatus('');
      } catch (e) {
        setStatus('Could not load gallery.json');
      }
    }

    async function loadSite() {
      try {
        const r = await fetch('/assets/site-images.json', { cache: 'no-cache' });
        site = r.ok ? await r.json() : {};
        renderSite();
      } catch (_) { site = {}; renderSite(); }
    }

    function move(arr, i, d) {
      const j = i + d;
      if (j < 0 || j >= arr.length) return;
      const t = arr[i];
      arr[i] = arr[j];
      arr[j] = t;
      renderGalleryCards();
      persistDraft();
    }

    function renderGalleryCards() {
      const root = document.getElementById('galleryCards');
      root.innerHTML = '';
      const arr = data[active] || [];
      arr.forEach((it, idx) => root.appendChild(galleryCard(it, idx, arr)));
    }

    function galleryCard(it, idx, arr) {
      const d = langDict();
      const card = document.createElement('div');
      card.className = 'media-card';

      const thumb = document.createElement('div');
      thumb.className = 'media-thumb';
      const img = document.createElement('img');
      img.alt = '';
      const ph = document.createElement('div');
      ph.className = 'ph';
      ph.textContent = 'No image';
      thumb.appendChild(ph);
      thumb.appendChild(img);

      function syncThumb() {
        const s = String(arr[idx].src || '').trim();
        if (!s) {
          img.removeAttribute('src');
          img.style.display = 'none';
          ph.style.display = '';
          ph.textContent = 'No image';
          return;
        }
        ph.style.display = 'none';
        img.style.display = '';
        img.style.opacity = '1';
        img.onerror = () => {
          img.style.opacity = '0.35';
          ph.style.display = '';
          ph.textContent = 'Broken URL';
        };
        img.onload = () => { img.style.opacity = '1'; };
        img.src = s;
      }

      const main = document.createElement('div');
      main.className = 'media-main';

      const fieldId = document.createElement('div');
      fieldId.className = 'field';
      const lblId = document.createElement('label');
      lblId.textContent = 'ID';
      const inpId = document.createElement('input');
      inpId.type = 'number';
      inpId.value = String(it.id ?? idx + 1);
      fieldId.appendChild(lblId);
      fieldId.appendChild(inpId);

      const fieldSrc = document.createElement('div');
      fieldSrc.className = 'field';
      const lblSrc = document.createElement('label');
      lblSrc.textContent = 'Image URL';
      const inpSrc = document.createElement('input');
      inpSrc.type = 'text';
      inpSrc.placeholder = '/assets/images/photo.jpg';
      inpSrc.value = it.src || '';
      fieldSrc.appendChild(lblSrc);
      fieldSrc.appendChild(inpSrc);

      const actions = document.createElement('div');
      actions.className = 'crud-actions';

      const fileInp = document.createElement('input');
      fileInp.type = 'file';
      fileInp.accept = 'image/*';
      fileInp.className = 'hidden';

      const btnReplace = document.createElement('button');
      btnReplace.type = 'button';
      btnReplace.className = 'primary';
      btnReplace.textContent = d.btnReplace;
      btnReplace.onclick = () => {
        fileInp.value = '';
        fileInp.onchange = async (ev) => {
          const file = ev.target.files?.[0];
          if (!file) return;
          try {
            const fd = new FormData();
            fd.append('file', file);
            const r = await fetch(serverBase() + '/upload-image', { method: 'POST', body: fd });
            if (r.ok) {
              const j = await r.json();
              if (j && j.ok && j.path) {
                arr[idx].src = j.path;
                inpSrc.value = j.path;
                syncThumb();
                persistDraft();
                return;
              }
            }
          } catch (_) {}
          const url = await readAsDataURL(file);
          arr[idx].src = url;
          inpSrc.value = url;
          syncThumb();
          persistDraft();
        };
        fileInp.click();
      };

      const btnImport = document.createElement('button');
      btnImport.type = 'button';
      btnImport.className = 'secondary';
      btnImport.textContent = d.btnImport;
      btnImport.onclick = async () => {
        const cur = inpSrc.value.trim();
        if (!cur || !/^https?:\/\//i.test(cur)) {
          alert('Paste an http(s) image URL in the field first.');
          return;
        }
        try {
          const r = await fetch(serverBase() + '/import-image', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url: cur }),
          });
          if (r.ok) {
            const j = await r.json();
            if (j && j.ok && j.path) {
              arr[idx].src = j.path;
              inpSrc.value = j.path;
              syncThumb();
              persistDraft();
              return;
            }
          }
          alert('Import failed (needs upload server).');
        } catch (_) {
          alert('Import failed.');
        }
      };

      const btnUp = document.createElement('button');
      btnUp.type = 'button';
      btnUp.className = 'secondary';
      btnUp.textContent = d.btnUp;
      btnUp.onclick = () => move(arr, idx, -1);

      const btnDown = document.createElement('button');
      btnDown.type = 'button';
      btnDown.className = 'secondary';
      btnDown.textContent = d.btnDown;
      btnDown.onclick = () => move(arr, idx, 1);

      const btnDel = document.createElement('button');
      btnDel.type = 'button';
      btnDel.className = 'danger';
      btnDel.textContent = d.btnDel;
      btnDel.onclick = () => {
        if (!confirm(d.delConfirm)) return;
        arr.splice(idx, 1);
        renderGalleryCards();
        persistDraft();
      };

      inpId.onchange = () => {
        arr[idx].id = Number(inpId.value) || idx + 1;
        persistDraft();
      };
      inpSrc.onchange = () => {
        arr[idx].src = inpSrc.value.trim();
        syncThumb();
        persistDraft();
      };

      actions.append(btnReplace, btnImport, btnUp, btnDown, btnDel);
      main.append(fieldId, fieldSrc, actions);
      card.append(thumb, main, fileInp);
      syncThumb();
      return card;
    }

    function renderSite() {
      ['heroBg','aboutUs','serviceWedding','servicePrivate','serviceCorporate','blogPalette','blogNegafa','blogVenues','blogLanterns','logoColor','logoWhite'].forEach(id => {
        const el = document.getElementById('f_' + id);
        if (!el) return;
        el.value = site[id] || '';
        el.onchange = () => {
          site[id] = el.value;
          try { localStorage.setItem('site_images_override', JSON.stringify(site)); } catch (_) {}
        };
      });
    }

    document.getElementById('add').onclick = () => {
      const arr = data[active];
      const next = arr.length ? Math.max(...arr.map(x => Number(x.id) || 0)) + 1 : 1;
      arr.push({ id: next, src: '', category: active });
      renderGalleryCards();
      persistDraft();
    };

    document.getElementById('reload').onclick = async () => {
      if (!confirm(langDict().reloadConfirm)) return;
      clearDraftStore();
      await loadGallery({ preferDraft: false });
      setStatus('Reloaded from site');
    };

    document.getElementById('clearDraft').onclick = () => {
      if (!confirm(langDict().clearDraftConfirm)) return;
      clearDraftStore();
      loadGallery({ preferDraft: false });
    };

    document.getElementById('saveGallery').onclick = async () => {
      persistDraft();
      const merged = mergeGalleryData();
      try {
        const r = await fetch(serverBase() + '/save-gallery', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(merged),
        });
        if (r.ok) {
          alert(langDict().saveDoneServer);
          return;
        }
      } catch (_) {}
      downloadGalleryBlob();
      alert(langDict().saveDownload);
    };

    function downloadGalleryBlob() {
      const merged = mergeGalleryData();
      const blob = new Blob([JSON.stringify(merged, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'gallery.json';
      a.click();
      URL.revokeObjectURL(a.href);
    }

    document.getElementById('download').onclick = () => downloadGalleryBlob();

    document.getElementById('reloadSite').onclick = loadSite;

    document.getElementById('saveSite').onclick = async () => {
      try {
        const r = await fetch(serverBase() + '/save-site', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(site),
        });
        if (r.ok) {
          alert(langDict().saveDoneServer);
          return;
        }
      } catch (_) {}
      const blob = new Blob([JSON.stringify(site, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'site-images.json';
      a.click();
      URL.revokeObjectURL(a.href);
    };

    document.getElementById('downloadSite').onclick = async () => {
      try {
        const r = await fetch(serverBase() + '/save-site', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(site),
        });
        if (r.ok) {
          alert(langDict().saveDoneServer);
          return;
        }
      } catch (_) {}
      const blob = new Blob([JSON.stringify(site, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'site-images.json';
      a.click();
      URL.revokeObjectURL(a.href);
    };

    function bindUploads() {
      document.querySelectorAll('#siteForm input[type="file"][data-up]').forEach(inp => {
        inp.onchange = async (ev) => {
          const key = inp.getAttribute('data-up');
          const textEl = document.getElementById('f_' + key);
          const file = ev.target.files?.[0];
          inp.value = '';
          if (!file || !textEl) return;
          try {
            const fd = new FormData();
            fd.append('file', file);
            const r = await fetch(serverBase() + '/upload-image', { method: 'POST', body: fd });
            if (r.ok) {
              const j = await r.json();
              if (j && j.ok && j.path) {
                textEl.value = j.path;
                site[key] = j.path;
                textEl.dispatchEvent(new Event('change'));
                renderSite();
                return;
              }
            }
          } catch (_) {}
          const url = await readAsDataURL(file);
          textEl.value = url;
          site[key] = url;
          try { localStorage.setItem('site_images_override', JSON.stringify(site)); } catch (_) {}
          renderSite();
        };
      });
    }
  </script>
</body>
</html>
