<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>So Nice Event CMS</title>
  <style>
    :root { --red:#7a121c; --yellow:#f3c74d; --bg:#fff8e8; --line:#eadfca; --text:#2b231d; }
    * { box-sizing: border-box; font-family: system-ui, -apple-system, Segoe UI, sans-serif; }
    body { margin:0; background:var(--bg); color:var(--text); }
    .wrap { max-width:1000px; margin:0 auto; padding:24px; }
    .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:16px; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .col { display:flex; flex-direction:column; gap:6px; margin-bottom:10px; }
    input, textarea, select, button { border:1px solid #d8cdb8; border-radius:8px; padding:10px; }
    textarea { min-height:82px; }
    button { background:var(--red); color:#fff; font-weight:600; cursor:pointer; }
    .ghost { background:#fff; color:var(--red); }
    h1,h2 { margin:0 0 10px; }
    .tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
    .tab { background:#fff; color:var(--red); }
    .tab.active { background:var(--red); color:#fff; }
    .hidden { display:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>So Nice Event CMS</h1>
    <div class="card">
      <div class="row">
        <div class="col">
          <label>Password</label>
          <input id="pass" type="password" />
        </div>
        <div class="col">
          <label>Language</label>
          <select id="lang"><option value="fr">FR</option><option value="en">EN</option><option value="ar">AR</option></select>
        </div>
      </div>
      <button id="enter">Enter</button>
    </div>

    <section id="app" class="hidden">
      <div class="tabs">
        <button class="tab active" data-tab="header">Header & Hero</button>
        <button class="tab" data-tab="services">Services</button>
        <button class="tab" data-tab="about">About</button>
        <button class="tab" data-tab="gallery">Gallery</button>
      </div>

      <div class="card panel" data-panel="header">
        <h2>Header & Hero</h2>
        <div class="col"><label>Hero Title</label><input id="hero_title" /></div>
        <div class="col"><label>Hero Subtitle 1</label><input id="hero_sub1" /></div>
        <div class="col"><label>Hero Subtitle 2</label><input id="hero_sub2" /></div>
        <div class="col"><label>Hero CTA</label><input id="hero_cta" /></div>
        <div class="col"><label>White Logo URL</label><input id="img_logoWhite" /></div>
        <div class="col"><label>Yellow Logo URL</label><input id="img_logoYellow" /></div>
        <div class="col"><label>Upload slideshow images (multiple)</label><input id="heroSlides" type="file" accept="image/*" multiple /></div>
      </div>

      <div class="card panel hidden" data-panel="services">
        <h2>Services</h2>
        <div class="col"><label>Section Title</label><input id="services_title" /></div>
        <div class="col"><label>Section Subtitle</label><input id="services_subtitle" /></div>
        <div id="services_list"></div>
      </div>

      <div class="card panel hidden" data-panel="about">
        <h2>About</h2>
        <div class="col"><label>Title</label><input id="about_title" /></div>
        <div class="col"><label>Paragraph 1</label><textarea id="about_p1"></textarea></div>
        <div class="col"><label>Paragraph 2</label><textarea id="about_p2"></textarea></div>
        <div class="col"><label>About image URL</label><input id="img_aboutUs" /></div>
      </div>

      <div class="card panel hidden" data-panel="gallery">
        <h2>Gallery</h2>
        <div class="col"><label>Section Title</label><input id="gallery_title" /></div>
        <div class="col"><label>Section Subtitle</label><input id="gallery_subtitle" /></div>
        <div class="row">
          <div class="col"><label>All label</label><input id="gallery_all" /></div>
          <div class="col"><label>Weddings label</label><input id="gallery_weddings" /></div>
          <div class="col"><label>Private label</label><input id="gallery_private" /></div>
          <div class="col"><label>Corporate label</label><input id="gallery_corporate" /></div>
          <div class="col"><label>Baby Shower label</label><input id="gallery_baby" /></div>
          <div class="col"><label>Birthdays label</label><input id="gallery_birthdays" /></div>
        </div>
        <div class="row">
          <div class="col">
            <label>Upload gallery image</label>
            <input id="gallery_upload" type="file" accept="image/*" />
          </div>
          <div class="col">
            <label>Category</label>
            <select id="gallery_upload_category">
              <option>Weddings</option>
              <option>Private Events</option>
              <option>Corporate Events</option>
              <option>Baby Shower</option>
              <option>Birthdays</option>
            </select>
          </div>
        </div>
        <button id="gallery_add" type="button">Add uploaded image to gallery</button>
        <div class="col">
          <label>Gallery JSON (advanced edit)</label>
          <textarea id="gallery_json" style="min-height:220px"></textarea>
        </div>
      </div>

      <div class="card">
        <button id="saveAll">Save All</button>
        <button id="reload" class="ghost">Reload</button>
        <p id="status"></p>
      </div>
    </section>
  </div>

  <script>
    const PASSPHRASES = ['soniceevent-admin', 'soniceevent-staff'];
    const base = () => (localStorage.getItem('cms_local_server') || 'http://localhost:4000').replace(/\/$/, '');
    let cms = {};
    let site = {};
    let gallery = [];
    let currentLang = 'fr';

    async function fetchJson(path, fallback) {
      try { const r = await fetch(path, { cache: 'no-cache' }); if (r.ok) return await r.json(); } catch (_) {}
      return fallback;
    }

    async function uploadFile(file) {
      const fd = new FormData(); fd.append('file', file);
      const r = await fetch(base() + '/upload-image', { method:'POST', body:fd });
      if (!r.ok) throw new Error('upload failed');
      const j = await r.json();
      if (!j.ok || !j.path) throw new Error('bad upload');
      return j.path;
    }

    function setStatus(msg) { document.getElementById('status').textContent = msg; }

    function ensureLang() {
      cms[currentLang] = cms[currentLang] || {};
      cms[currentLang].hero = cms[currentLang].hero || {};
      cms[currentLang].services = cms[currentLang].services || { serviceList: [] };
      cms[currentLang].gallery = cms[currentLang].gallery || { filterLabels: {} };
      cms[currentLang].about = cms[currentLang].about || {};
      while ((cms[currentLang].services.serviceList || []).length < 5) {
        cms[currentLang].services.serviceList.push({ title:'', description:'' });
      }
    }

    function render() {
      ensureLang();
      const c = cms[currentLang];
      document.getElementById('hero_title').value = c.hero.title || '';
      document.getElementById('hero_sub1').value = c.hero.subtitle1 || '';
      document.getElementById('hero_sub2').value = c.hero.subtitle2 || '';
      document.getElementById('hero_cta').value = c.hero.ctaButton || '';
      document.getElementById('img_logoWhite').value = site.logoWhite || '';
      document.getElementById('img_logoYellow').value = site.logoYellow || '';
      document.getElementById('services_title').value = c.services.title || '';
      document.getElementById('services_subtitle').value = c.services.subtitle || '';
      document.getElementById('about_title').value = c.about.title || '';
      document.getElementById('about_p1').value = c.about.paragraph1 || '';
      document.getElementById('about_p2').value = c.about.paragraph2 || '';
      document.getElementById('img_aboutUs').value = site.aboutUs || '';
      document.getElementById('gallery_title').value = c.gallery.title || '';
      document.getElementById('gallery_subtitle').value = c.gallery.subtitle || '';
      document.getElementById('gallery_all').value = c.gallery.filterLabels?.all || '';
      document.getElementById('gallery_weddings').value = c.gallery.filterLabels?.weddings || '';
      document.getElementById('gallery_private').value = c.gallery.filterLabels?.private || '';
      document.getElementById('gallery_corporate').value = c.gallery.filterLabels?.corporate || '';
      document.getElementById('gallery_baby').value = c.gallery.filterLabels?.babyShower || '';
      document.getElementById('gallery_birthdays').value = c.gallery.filterLabels?.birthdays || '';
      document.getElementById('gallery_json').value = JSON.stringify(gallery, null, 2);

      const root = document.getElementById('services_list');
      root.innerHTML = '';
      c.services.serviceList.forEach((s, idx) => {
        const block = document.createElement('div');
        block.className = 'card';
        block.innerHTML = `
          <div class="col"><label>Service ${idx + 1} title</label><input id="sv_t_${idx}" /></div>
          <div class="col"><label>Service ${idx + 1} description</label><textarea id="sv_d_${idx}"></textarea></div>
          <div class="col"><label>Service ${idx + 1} image URL</label><input id="sv_i_${idx}" /></div>
          <div class="col"><label>Upload image</label><input id="sv_u_${idx}" type="file" accept="image/*" /></div>
        `;
        root.appendChild(block);
        document.getElementById(`sv_t_${idx}`).value = s.title || '';
        document.getElementById(`sv_d_${idx}`).value = s.description || '';
        const imgKey = ['serviceWedding','servicePrivate','serviceCorporate','serviceBabyShower','serviceBirthday'][idx];
        document.getElementById(`sv_i_${idx}`).value = site[imgKey] || '';
        document.getElementById(`sv_u_${idx}`).addEventListener('change', async (e) => {
          const f = e.target.files && e.target.files[0];
          if (!f) return;
          const p = await uploadFile(f);
          site[imgKey] = p;
          document.getElementById(`sv_i_${idx}`).value = p;
        });
      });
    }

    function collect() {
      ensureLang();
      const c = cms[currentLang];
      c.hero.title = document.getElementById('hero_title').value.trim();
      c.hero.subtitle1 = document.getElementById('hero_sub1').value.trim();
      c.hero.subtitle2 = document.getElementById('hero_sub2').value.trim();
      c.hero.ctaButton = document.getElementById('hero_cta').value.trim();
      site.logoWhite = document.getElementById('img_logoWhite').value.trim();
      site.logoYellow = document.getElementById('img_logoYellow').value.trim();
      c.services.title = document.getElementById('services_title').value.trim();
      c.services.subtitle = document.getElementById('services_subtitle').value.trim();
      c.services.serviceList = c.services.serviceList.map((s, idx) => ({
        ...s,
        title: document.getElementById(`sv_t_${idx}`).value.trim(),
        description: document.getElementById(`sv_d_${idx}`).value.trim(),
      }));
      site.serviceWedding = document.getElementById('sv_i_0').value.trim();
      site.servicePrivate = document.getElementById('sv_i_1').value.trim();
      site.serviceCorporate = document.getElementById('sv_i_2').value.trim();
      site.serviceBabyShower = document.getElementById('sv_i_3').value.trim();
      site.serviceBirthday = document.getElementById('sv_i_4').value.trim();
      c.about.title = document.getElementById('about_title').value.trim();
      c.about.paragraph1 = document.getElementById('about_p1').value.trim();
      c.about.paragraph2 = document.getElementById('about_p2').value.trim();
      site.aboutUs = document.getElementById('img_aboutUs').value.trim();
      c.gallery.title = document.getElementById('gallery_title').value.trim();
      c.gallery.subtitle = document.getElementById('gallery_subtitle').value.trim();
      c.gallery.filterLabels = {
        all: document.getElementById('gallery_all').value.trim(),
        weddings: document.getElementById('gallery_weddings').value.trim(),
        private: document.getElementById('gallery_private').value.trim(),
        corporate: document.getElementById('gallery_corporate').value.trim(),
        babyShower: document.getElementById('gallery_baby').value.trim(),
        birthdays: document.getElementById('gallery_birthdays').value.trim(),
      };
      gallery = JSON.parse(document.getElementById('gallery_json').value || '[]');
    }

    async function init() {
      cms = await fetchJson('/assets/cms-content.json', {});
      site = await fetchJson('/assets/site-images.json', {});
      gallery = await fetchJson('/assets/gallery.json', []);
      render();
    }

    document.getElementById('enter').onclick = async () => {
      const v = document.getElementById('pass').value.trim();
      if (!PASSPHRASES.includes(v)) return alert('Wrong password');
      document.getElementById('app').classList.remove('hidden');
      currentLang = document.getElementById('lang').value;
      await init();
    };

    document.getElementById('lang').onchange = (e) => { currentLang = e.target.value; render(); };
    document.querySelectorAll('.tab').forEach((btn) => btn.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
      const tab = btn.getAttribute('data-tab');
      document.querySelectorAll('.panel').forEach((p) => p.classList.add('hidden'));
      document.querySelector(`.panel[data-panel="${tab}"]`).classList.remove('hidden');
    }));

    document.getElementById('heroSlides').addEventListener('change', async (e) => {
      const files = Array.from(e.target.files || []);
      if (!files.length) return;
      setStatus('Uploading slideshow images...');
      const urls = [];
      for (const f of files) urls.push(await uploadFile(f));
      site.heroSlides = urls;
      setStatus('Slideshow images uploaded.');
    });

    document.getElementById('saveAll').onclick = async () => {
      try {
        collect();
        await fetch(base() + '/save-site', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(site) });
        await fetch(base() + '/save-content', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(cms) });
        await fetch(base() + '/save-gallery', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(gallery) });
        setStatus('Saved successfully.');
      } catch (e) {
        setStatus('Save failed. Check upload server.');
      }
    };
    document.getElementById('gallery_add').onclick = async () => {
      try {
        const inp = document.getElementById('gallery_upload');
        const f = inp.files && inp.files[0];
        if (!f) return alert('Choose an image first');
        const category = document.getElementById('gallery_upload_category').value;
        const src = await uploadFile(f);
        const nextId = gallery.length ? Math.max(...gallery.map((g) => Number(g.id) || 0)) + 1 : 1;
        gallery.push({ id: nextId, src, category });
        document.getElementById('gallery_json').value = JSON.stringify(gallery, null, 2);
        setStatus('Gallery image added.');
      } catch (_) {
        setStatus('Could not add image.');
      }
    };
    document.getElementById('reload').onclick = init;
  </script>
</body>
</html>
