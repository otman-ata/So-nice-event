<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Gallery · Manage photos</title>
  <style>
    :root { --rose:#8d555f; --rose-hover:#74464f; --paper:#fdfbf8; --ink:#1c1917; --muted:#78716c; --line:#e7e5e4; --card:#fff; --radius:14px; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; background: linear-gradient(165deg, #f5f0f1 0%, var(--paper) 45%); color: var(--ink); }
    .shell { max-width: 860px; margin: 0 auto; padding: 28px 20px 48px; }
    .brand { text-align: center; margin-bottom: 24px; }
    .brand h1 { margin: 0; color: var(--rose); font-size: 1.5rem; }
    .brand p { margin: 6px 0 0; color: var(--muted); font-size: .9rem; }
    .card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--line); padding: 18px; box-shadow: 0 2px 14px rgba(28,25,23,.05); }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    input[type="password"], input[type="text"], input[type="number"], select { padding: 10px 12px; border-radius: 10px; border: 1px solid var(--line); }
    button { padding: 10px 14px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; }
    .btn { background: var(--rose); color: #fff; }
    .ghost { background: #fff; color: var(--ink); border: 1px solid var(--line); }
    .danger { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
    .app.hidden, #gate.hidden { display: none !important; }
    .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin: 14px 0; }
    .tab { padding: 10px 18px; border-radius: 999px; border: 1px solid var(--line); background: #fff; color: var(--muted); }
    .tab.active { background: var(--rose); color: #fff; border-color: var(--rose); }
    .gallery-list { display: flex; flex-direction: column; gap: 14px; margin-top: 12px; }
    .photo-card { display: flex; gap: 14px; flex-wrap: wrap; padding: 14px; border: 1px solid var(--line); border-radius: 12px; background: #fff; }
    .photo-thumb { width: 132px; height: 100px; border-radius: 10px; overflow: hidden; border: 1px solid var(--line); background: #f5f5f4; display: flex; align-items: center; justify-content: center; color: #a8a29e; font-size: 11px; text-align: center; padding: 8px; }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: none; }
    .photo-thumb img.show { display: block; }
    .photo-body { flex: 1; min-width: 220px; }
    .field { margin-bottom: 10px; }
    .field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; }
    .status { min-height: 20px; margin-top: 8px; color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>
  <div class="shell">
    <header class="brand">
      <h1 id="title">Gallery</h1>
      <p id="subtitle">Upload and organize website images.</p>
    </header>

    <section id="gate">
      <div class="card">
        <label id="passwordLabel" for="pass">Password</label>
        <div class="row">
          <input id="pass" type="password" autocomplete="current-password" />
          <button type="button" class="btn" id="enter">Enter</button>
          <select id="lang" title="Language">
            <option value="en">EN</option>
            <option value="fr">FR</option>
            <option value="ar">AR</option>
          </select>
        </div>
      </div>
    </section>

    <section id="app" class="app hidden">
      <div class="card">
        <div class="tabs">
          <button class="tab active" data-tab="Weddings">Weddings</button>
          <button class="tab" data-tab="Private Events">Private events</button>
          <button class="tab" data-tab="Corporate Events">Corporate</button>
          <button class="tab" data-tab="Baby Shower">Baby Shower</button>
          <button class="tab" data-tab="Birthdays">Birthdays</button>
        </div>
        <div class="row">
          <button type="button" id="add" class="btn">+ Add photo</button>
          <button type="button" id="reload" class="ghost">Reload list</button>
          <button type="button" id="saveGallery" class="btn">Save changes</button>
        </div>
        <p id="status" class="status"></p>
        <div id="galleryCards" class="gallery-list"></div>
      </div>
    </section>
  </div>

  <script>
    const PASSPHRASES = ["soniceevent-admin", "soniceevent-staff"];
    const DRAFT_KEY = "so_nice_gallery_draft";
    const data = { "Weddings": [], "Private Events": [], "Corporate Events": [], "Baby Shower": [], "Birthdays": [] };
    let active = "Weddings";
    const lang = document.getElementById("lang");
    const base = () => (localStorage.getItem("cms_local_server") || "http://localhost:4000").replace(/\/$/, "");

    const T = {
      en: { title:"Gallery", subtitle:"Upload and organize website images.", password:"Password", enter:"Enter", wrong:"Wrong password", add:"+ Add photo", reload:"Reload list", save:"Save changes", saved:"Saved on server.", local:"Server unavailable - saved only in this browser.", updated:"Updated.", del:"Delete this photo?", upload:"Upload image", id:"ID", url:"Image URL", up:"Up", down:"Down", delete:"Delete", noImage:"No image" },
      fr: { title:"Galerie", subtitle:"Televerser et organiser les images du site.", password:"Mot de passe", enter:"Entrer", wrong:"Mot de passe incorrect", add:"+ Ajouter photo", reload:"Recharger", save:"Enregistrer", saved:"Enregistre sur le serveur.", local:"Serveur indisponible - enregistre dans ce navigateur.", updated:"Mise a jour.", del:"Supprimer cette photo ?", upload:"Televerser image", id:"ID", url:"URL image", up:"Haut", down:"Bas", delete:"Supprimer", noImage:"Aucune image" },
      ar: { title:"المعرض", subtitle:"رفع وتنظيم صور الموقع.", password:"كلمة المرور", enter:"دخول", wrong:"كلمة مرور خاطئة", add:"+ إضافة صورة", reload:"تحديث", save:"حفظ", saved:"تم الحفظ على الخادم.", local:"الخادم غير متاح - تم الحفظ في المتصفح فقط.", updated:"تم التحديث.", del:"حذف هذه الصورة؟", upload:"رفع صورة", id:"المعرف", url:"رابط الصورة", up:"أعلى", down:"أسفل", delete:"حذف", noImage:"لا صورة" }
    };
    const d = () => T[lang.value] || T.en;

    function applyLang() {
      const x = d();
      document.getElementById("title").textContent = x.title;
      document.getElementById("subtitle").textContent = x.subtitle;
      document.getElementById("passwordLabel").textContent = x.password;
      document.getElementById("enter").textContent = x.enter;
      document.getElementById("add").textContent = x.add;
      document.getElementById("reload").textContent = x.reload;
      document.getElementById("saveGallery").textContent = x.save;
      document.documentElement.dir = lang.value === "ar" ? "rtl" : "ltr";
      render();
    }

    function merged() {
      return Object.keys(data).flatMap((c) => (data[c] || []).map((i) => ({ id: Number(i.id), src: String(i.src || ""), category: c })));
    }
    function persistDraft() {
      try { localStorage.setItem(DRAFT_KEY, JSON.stringify(merged())); } catch {}
      document.getElementById("status").textContent = d().updated;
    }

    async function upload(file) {
      const fd = new FormData();
      fd.append("file", file);
      const res = await fetch(base() + "/upload-image", { method: "POST", body: fd });
      if (!res.ok) throw new Error("upload");
      const j = await res.json();
      if (!j.ok || !j.path) throw new Error("upload");
      return j.path;
    }

    function render() {
      const root = document.getElementById("galleryCards");
      root.innerHTML = "";
      const arr = data[active] || [];
      arr.forEach((it, idx) => {
        const card = document.createElement("div");
        card.className = "photo-card";
        card.innerHTML = `
          <div class="photo-thumb"><img id="img_${idx}" /><span id="empty_${idx}">${d().noImage}</span></div>
          <div class="photo-body">
            <div class="field"><label>${d().id}</label><input id="id_${idx}" type="number" value="${Number(it.id) || idx + 1}" /></div>
            <div class="field"><label>${d().url}</label><input id="src_${idx}" type="text" value="${it.src || ""}" /></div>
            <div class="row">
              <button type="button" class="btn" id="up_${idx}">${d().upload}</button>
              <button type="button" class="ghost" id="mvup_${idx}">${d().up}</button>
              <button type="button" class="ghost" id="mvdn_${idx}">${d().down}</button>
              <button type="button" class="danger" id="del_${idx}">${d().delete}</button>
              <input id="file_${idx}" type="file" accept="image/*" style="display:none" />
            </div>
          </div>
        `;
        root.appendChild(card);

        const img = document.getElementById(`img_${idx}`);
        const empty = document.getElementById(`empty_${idx}`);
        const sync = () => {
          const s = String(arr[idx].src || "").trim();
          if (!s) {
            img.classList.remove("show");
            img.removeAttribute("src");
            empty.style.display = "";
            return;
          }
          img.src = s;
          img.classList.add("show");
          empty.style.display = "none";
        };
        sync();

        document.getElementById(`id_${idx}`).onchange = (e) => { arr[idx].id = Number(e.target.value) || idx + 1; persistDraft(); };
        document.getElementById(`src_${idx}`).onchange = (e) => { arr[idx].src = e.target.value.trim(); sync(); persistDraft(); };
        document.getElementById(`up_${idx}`).onclick = () => document.getElementById(`file_${idx}`).click();
        document.getElementById(`file_${idx}`).onchange = async (e) => {
          const f = e.target.files && e.target.files[0];
          if (!f) return;
          try {
            arr[idx].src = await upload(f);
            document.getElementById(`src_${idx}`).value = arr[idx].src;
            sync();
            persistDraft();
          } catch {}
        };
        document.getElementById(`del_${idx}`).onclick = () => {
          if (!confirm(d().del)) return;
          arr.splice(idx, 1);
          render();
          persistDraft();
        };
        document.getElementById(`mvup_${idx}`).onclick = () => {
          if (idx < 1) return;
          [arr[idx - 1], arr[idx]] = [arr[idx], arr[idx - 1]];
          render();
          persistDraft();
        };
        document.getElementById(`mvdn_${idx}`).onclick = () => {
          if (idx >= arr.length - 1) return;
          [arr[idx + 1], arr[idx]] = [arr[idx], arr[idx + 1]];
          render();
          persistDraft();
        };
      });
    }

    async function load(preferDraft) {
      if (preferDraft) {
        try {
          const draft = JSON.parse(localStorage.getItem(DRAFT_KEY) || "");
          if (Array.isArray(draft) && draft.length) {
            Object.keys(data).forEach((k) => (data[k] = draft.filter((i) => i.category === k)));
            render();
            return;
          }
        } catch {}
      }
      try {
        const res = await fetch("/assets/gallery.json", { cache: "no-cache" });
        if (res.ok) {
          const arr = await res.json();
          Object.keys(data).forEach((k) => (data[k] = arr.filter((i) => i.category === k)));
        }
      } catch {}
      render();
    }

    document.querySelectorAll(".tab").forEach((el) => el.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
      el.classList.add("active");
      active = el.getAttribute("data-tab");
      render();
    }));
    lang.addEventListener("change", applyLang);
    document.getElementById("enter").onclick = async () => {
      const v = document.getElementById("pass").value.trim();
      if (!PASSPHRASES.includes(v)) return alert(d().wrong);
      document.getElementById("gate").classList.add("hidden");
      document.getElementById("app").classList.remove("hidden");
      applyLang();
      await load(true);
    };
    document.getElementById("add").onclick = () => {
      const arr = data[active];
      const next = arr.length ? Math.max(...arr.map((x) => Number(x.id) || 0)) + 1 : 1;
      arr.push({ id: next, src: "", category: active });
      render();
      persistDraft();
    };
    document.getElementById("reload").onclick = async () => { await load(false); };
    document.getElementById("saveGallery").onclick = async () => {
      persistDraft();
      try {
        const r = await fetch(base() + "/save-gallery", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(merged()),
        });
        alert(r.ok ? d().saved : d().local);
      } catch {
        alert(d().local);
      }
    };
    applyLang();
  </script>
</body>
</html>
