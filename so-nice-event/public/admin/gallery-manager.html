<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Gallery · Manage photos</title>
  <style>
    :root {
      --rose: #8D555F;
      --rose-hover: #74464f;
      --paper: #fdfbf8;
      --ink: #1c1917;
      --muted: #78716c;
      --line: #e7e5e4;
      --card: #ffffff;
      --radius: 14px;
      --font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      background: linear-gradient(165deg, #f5f0f1 0%, var(--paper) 45%);
      color: var(--ink);
    }
    .shell { max-width: 820px; margin: 0 auto; padding: 28px 20px 48px; }
    .brand {
      text-align: center;
      margin-bottom: 28px;
    }
    .brand h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--rose);
    }
    .brand p { margin: 6px 0 0; font-size: 0.875rem; color: var(--muted); }

    .gate-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 28px 24px;
      box-shadow: 0 4px 24px rgba(28, 25, 23, 0.06);
      border: 1px solid var(--line);
      max-width: 400px;
      margin: 0 auto 24px;
    }
    .gate-card label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em; }
    .gate-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .gate-row input[type="password"] { flex: 1; min-width: 160px; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--line); font-size: 15px; }
    .gate-row select { padding: 12px 14px; border-radius: 10px; border: 1px solid var(--line); background: var(--paper); }

    button.btn {
      padding: 11px 18px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.12s ease, background 0.15s ease;
    }
    button.btn:active { transform: scale(0.98); }
    button.btn-solid {
      background: var(--rose);
      color: #fff;
    }
    button.btn-solid:hover { background: var(--rose-hover); }
    button.btn-ghost {
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--line);
    }
    button.btn-ghost:hover { background: rgba(141, 85, 95, 0.06); }
    button.btn-danger {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }
    button.btn-danger:hover { background: #fee2e2; }

    .app.hidden { display: none !important; }
    #gate.hidden { display: none !important; }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
      padding: 14px;
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--line);
      box-shadow: 0 2px 12px rgba(28, 25, 23, 0.04);
    }
    .toolbar .tool-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); display: block; margin-bottom: 4px; }
    .toolbar-group { display: flex; flex-direction: column; gap: 4px; }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }
    .tabs button {
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--card);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: var(--muted);
      font-family: inherit;
    }
    .tabs button.active {
      background: var(--rose);
      color: #fff;
      border-color: var(--rose);
    }

    .status {
      font-size: 13px;
      color: var(--muted);
      margin: -8px 0 18px;
      min-height: 1.25em;
    }

    .gallery-list { display: flex; flex-direction: column; gap: 16px; }

    .photo-card {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      align-items: flex-start;
      padding: 18px;
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--line);
      box-shadow: 0 2px 14px rgba(28, 25, 23, 0.045);
    }
    .photo-thumb {
      width: 132px;
      height: 100px;
      border-radius: 12px;
      overflow: hidden;
      background: #f5f5f4;
      border: 1px solid var(--line);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: none; }
    .photo-thumb img.show { display: block; }
    .photo-thumb .empty {
      font-size: 11px;
      color: #a8a29e;
      text-align: center;
      padding: 8px;
      line-height: 1.35;
    }

    .photo-body { flex: 1; min-width: 200px; }
    .field { margin-bottom: 12px; }
    .field label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      font-size: 14px;
      font-family: ui-monospace, monospace;
    }
    .crud-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }
    .crud-row .btn { padding: 9px 14px; font-size: 13px; }

    footer.hint {
      margin-top: 28px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="brand">
      <h1 id="t_title">Gallery</h1>
      <p id="t_sub">Add, edit, or remove photos by category.</p>
    </header>

    <section id="gate">
      <div class="gate-card">
        <label id="gateLbl" for="pass">Password</label>
        <div class="gate-row">
          <input id="pass" type="password" autocomplete="current-password" placeholder="••••••••" />
          <button type="button" class="btn btn-solid" id="enter">Enter</button>
          <select id="lang" title="Language">
            <option value="en">EN</option>
            <option value="fr">FR</option>
            <option value="ar">AR</option>
          </select>
        </div>
      </div>
    </section>

    <section id="app" class="app hidden">
      <div class="toolbar">
        <div class="toolbar-group">
          <span class="tool-label" id="lblCreate">Create</span>
          <button type="button" class="btn btn-solid" id="add">+ Add photo</button>
        </div>
        <div class="toolbar-group">
          <span class="tool-label" id="lblRead">Read</span>
          <button type="button" class="btn btn-ghost" id="reload">Reload list</button>
        </div>
        <div class="toolbar-group">
          <span class="tool-label" id="lblSave">Save</span>
          <button type="button" class="btn btn-solid" id="saveGallery">Save changes</button>
        </div>
      </div>

      <div class="tabs">
        <button type="button" class="tab active" data-tab="Weddings" id="tab_w">Weddings</button>
        <button type="button" class="tab" data-tab="Private Events" id="tab_p">Private events</button>
        <button type="button" class="tab" data-tab="Corporate Events" id="tab_c">Corporate</button>
      </div>

      <p class="status" id="status"></p>
      <div id="galleryCards" class="gallery-list"></div>

      <footer class="hint" id="t_footer"></footer>
    </section>
  </div>

  <script>
    /** Either passphrase works (gallery only). */
    const PASSPHRASES = ['soniceevent-admin', 'soniceevent-staff'];
    const DRAFT_KEY = 'so_nice_gallery_draft';

    const T = {
      en: {
        title: 'Gallery',
        sub: 'Add, edit, or remove photos by category.',
        gateLbl: 'Password',
        enter: 'Enter',
        wrong: 'Wrong password',
        lblCreate: 'Create',
        lblRead: 'Read',
        lblSave: 'Save',
        add: '+ Add photo',
        reload: 'Reload list',
        saveGallery: 'Save changes',
        footer: 'Changes apply on this site preview in this browser. Run upload-server locally if you want files saved on disk.',
        reloadConfirm: 'Reload from website? Unsaved changes in this browser will be lost.',
        draftSaved: 'Updated. Refresh the homepage to preview.',
        saveOk: 'Saved on server.',
        saveLocal: 'Server unavailable — kept in this browser only.',
        delConfirm: 'Delete this photo?',
        fldId: 'ID',
        fldUrl: 'Image URL',
        btnUpdate: 'Update',
        btnDelete: 'Delete',
        btnUp: 'Up',
        btnDown: 'Down',
        emptyThumb: 'No image',
      },
      fr: {
        title: 'Galerie',
        sub: 'Ajouter, modifier ou supprimer des photos.',
        gateLbl: 'Mot de passe',
        enter: 'Entrer',
        wrong: 'Incorrect',
        lblCreate: 'Créer',
        lblRead: 'Lire',
        lblSave: 'Enregistrer',
        add: '+ Ajouter',
        reload: 'Recharger',
        saveGallery: 'Enregistrer',
        footer: '',
        reloadConfirm: 'Recharger depuis le site ?',
        draftSaved: 'Mis à jour.',
        saveOk: 'Enregistré sur le serveur.',
        saveLocal: 'Hors ligne — seulement dans ce navigateur.',
        delConfirm: 'Supprimer ?',
        fldId: 'ID',
        fldUrl: 'URL image',
        btnUpdate: 'Mettre à jour',
        btnDelete: 'Supprimer',
        btnUp: 'Haut',
        btnDown: 'Bas',
        emptyThumb: 'Aucune image',
      },
      ar: {
        title: 'المعرض',
        sub: 'إدارة الصور حسب الفئة.',
        gateLbl: 'كلمة المرور',
        enter: 'دخول',
        wrong: 'خطأ',
        lblCreate: 'إضافة',
        lblRead: 'تحديث القائمة',
        lblSave: 'حفظ',
        add: '+ صورة',
        reload: 'تحديث',
        saveGallery: 'حفظ',
        footer: '',
        reloadConfirm: 'إعادة التحميل من الموقع؟',
        draftSaved: 'تم التحديث.',
        saveOk: 'حُفظ على الخادم.',
        saveLocal: 'غير متصل — هذا المتصفح فقط.',
        delConfirm: 'حذف؟',
        fldId: 'المعرّف',
        fldUrl: 'رابط الصورة',
        btnUpdate: 'تحديث',
        btnDelete: 'حذف',
        btnUp: 'أعلى',
        btnDown: 'أسفل',
        emptyThumb: 'لا صورة',
      },
    };

    const lang = document.getElementById('lang');

    function dict() {
      return T[lang.value] || T.en;
    }

    function applyLang() {
      const d = dict();
      document.getElementById('t_title').textContent = d.title;
      document.getElementById('t_sub').textContent = d.sub;
      document.getElementById('gateLbl').textContent = d.gateLbl;
      document.getElementById('enter').textContent = d.enter;
      document.getElementById('lblCreate').textContent = d.lblCreate;
      document.getElementById('lblRead').textContent = d.lblRead;
      document.getElementById('lblSave').textContent = d.lblSave;
      document.getElementById('add').textContent = d.add;
      document.getElementById('reload').textContent = d.reload;
      document.getElementById('saveGallery').textContent = d.saveGallery;
      document.getElementById('t_footer').textContent = d.footer;
      document.documentElement.dir = lang.value === 'ar' ? 'rtl' : 'ltr';
      renderGalleryCards();
    }

    lang.addEventListener('change', applyLang);

    const data = { Weddings: [], 'Private Events': [], 'Corporate Events': [] };
    let active = 'Weddings';

    function serverBase() {
      return (localStorage.getItem('cms_local_server') || 'http://localhost:4000').replace(/\/$/, '');
    }

    function mergeGalleryData() {
      return ['Weddings', 'Private Events', 'Corporate Events'].flatMap((c) =>
        (data[c] || []).map((it) => ({
          id: Number(it.id),
          src: String(it.src || '').trim(),
          category: c,
        }))
      );
    }

    function persistDraft() {
      try {
        localStorage.setItem(DRAFT_KEY, JSON.stringify(mergeGalleryData()));
      } catch (_) {}
      const el = document.getElementById('status');
      if (el) el.textContent = dict().draftSaved;
    }

    function clearDraftStore() {
      try {
        localStorage.removeItem(DRAFT_KEY);
      } catch (_) {}
    }

    function readAsDataURL(file) {
      return new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result);
        r.onerror = rej;
        r.readAsDataURL(file);
      });
    }

    async function loadGallery(opts) {
      const preferDraft = opts && opts.preferDraft;
      const el = document.getElementById('status');
      if (preferDraft) {
        try {
          const draft = JSON.parse(localStorage.getItem(DRAFT_KEY) || '');
          if (Array.isArray(draft) && draft.length) {
            ['Weddings', 'Private Events', 'Corporate Events'].forEach((c) => {
              data[c] = draft.filter((i) => i.category === c);
            });
            renderGalleryCards();
            if (el) el.textContent = dict().draftSaved;
            return;
          }
        } catch (_) {}
      }
      try {
        const r = await fetch('/assets/gallery.json', { cache: 'no-cache' });
        if (r.ok) {
          const arr = await r.json();
          ['Weddings', 'Private Events', 'Corporate Events'].forEach((c) => {
            data[c] = arr.filter((i) => i.category === c);
          });
        }
      } catch (_) {}
      renderGalleryCards();
      if (el) el.textContent = '';
    }

    function move(arr, i, delta) {
      const j = i + delta;
      if (j < 0 || j >= arr.length) return;
      const t = arr[i];
      arr[i] = arr[j];
      arr[j] = t;
      renderGalleryCards();
      persistDraft();
    }

    function renderGalleryCards() {
      const root = document.getElementById('galleryCards');
      const d = dict();
      root.innerHTML = '';
      const arr = data[active] || [];
      arr.forEach((it, idx) => {
        const card = document.createElement('div');
        card.className = 'photo-card';

        const thumb = document.createElement('div');
        thumb.className = 'photo-thumb';
        const img = document.createElement('img');
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = d.emptyThumb;
        thumb.appendChild(empty);
        thumb.appendChild(img);

        function syncThumb() {
          const s = String(arr[idx].src || '').trim();
          if (!s) {
            img.removeAttribute('src');
            img.classList.remove('show');
            empty.style.display = '';
            return;
          }
          empty.style.display = 'none';
          img.classList.add('show');
          img.onerror = () => {
            img.classList.remove('show');
            empty.style.display = '';
            empty.textContent = d.emptyThumb;
          };
          img.src = s;
        }

        const body = document.createElement('div');
        body.className = 'photo-body';

        const fId = document.createElement('div');
        fId.className = 'field';
        fId.innerHTML = `<label>${d.fldId}</label>`;
        const inpId = document.createElement('input');
        inpId.type = 'number';
        inpId.value = String(it.id ?? idx + 1);
        fId.appendChild(inpId);

        const fSrc = document.createElement('div');
        fSrc.className = 'field';
        fSrc.innerHTML = `<label>${d.fldUrl}</label>`;
        const inpSrc = document.createElement('input');
        inpSrc.type = 'text';
        inpSrc.placeholder = '/assets/images/photo.jpg';
        inpSrc.value = it.src || '';
        fSrc.appendChild(inpSrc);

        const crud = document.createElement('div');
        crud.className = 'crud-row';

        const fileInp = document.createElement('input');
        fileInp.type = 'file';
        fileInp.accept = 'image/*';
        fileInp.className = 'hidden';
        fileInp.style.display = 'none';

        const btnUpdate = document.createElement('button');
        btnUpdate.type = 'button';
        btnUpdate.className = 'btn btn-solid';
        btnUpdate.textContent = d.btnUpdate;
        btnUpdate.onclick = () => {
          fileInp.value = '';
          fileInp.onchange = async (ev) => {
            const file = ev.target.files && ev.target.files[0];
            if (!file) return;
            try {
              const fd = new FormData();
              fd.append('file', file);
              const res = await fetch(serverBase() + '/upload-image', { method: 'POST', body: fd });
              if (res.ok) {
                const j = await res.json();
                if (j && j.ok && j.path) {
                  arr[idx].src = j.path;
                  inpSrc.value = j.path;
                  syncThumb();
                  persistDraft();
                  return;
                }
              }
            } catch (_) {}
            const url = await readAsDataURL(file);
            arr[idx].src = url;
            inpSrc.value = url;
            syncThumb();
            persistDraft();
          };
          fileInp.click();
        };

        const btnDel = document.createElement('button');
        btnDel.type = 'button';
        btnDel.className = 'btn btn-danger';
        btnDel.textContent = d.btnDelete;
        btnDel.onclick = () => {
          if (!confirm(d.delConfirm)) return;
          arr.splice(idx, 1);
          renderGalleryCards();
          persistDraft();
        };

        const btnUp = document.createElement('button');
        btnUp.type = 'button';
        btnUp.className = 'btn btn-ghost';
        btnUp.textContent = d.btnUp;
        btnUp.onclick = () => move(arr, idx, -1);

        const btnDn = document.createElement('button');
        btnDn.type = 'button';
        btnDn.className = 'btn btn-ghost';
        btnDn.textContent = d.btnDown;
        btnDn.onclick = () => move(arr, idx, 1);

        inpId.onchange = () => {
          arr[idx].id = Number(inpId.value) || idx + 1;
          persistDraft();
        };
        inpSrc.onchange = () => {
          arr[idx].src = inpSrc.value.trim();
          syncThumb();
          persistDraft();
        };

        crud.append(btnUpdate, btnDel, btnUp, btnDn);
        body.append(fId, fSrc, crud);
        card.append(thumb, body, fileInp);
        root.appendChild(card);
        syncThumb();
      });
    }

    document.querySelectorAll('.tabs .tab').forEach((btn) => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tabs .tab').forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
        active = btn.getAttribute('data-tab');
        renderGalleryCards();
      });
    });

    document.getElementById('enter').onclick = () => {
      const v = document.getElementById('pass').value.trim();
      if (!PASSPHRASES.includes(v)) {
        alert(dict().wrong);
        return;
      }
      document.getElementById('gate').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      applyLang();
      loadGallery({ preferDraft: true });
    };

    document.getElementById('add').onclick = () => {
      const arr = data[active];
      const next = arr.length ? Math.max(...arr.map((x) => Number(x.id) || 0)) + 1 : 1;
      arr.push({ id: next, src: '', category: active });
      renderGalleryCards();
      persistDraft();
    };

    document.getElementById('reload').onclick = async () => {
      if (!confirm(dict().reloadConfirm)) return;
      clearDraftStore();
      await loadGallery({ preferDraft: false });
    };

    document.getElementById('saveGallery').onclick = async () => {
      persistDraft();
      const merged = mergeGalleryData();
      try {
        const r = await fetch(serverBase() + '/save-gallery', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(merged),
        });
        if (r.ok) {
          alert(dict().saveOk);
          return;
        }
      } catch (_) {}
      alert(dict().saveLocal);
    };

    applyLang();
    document.getElementById('galleryCards').innerHTML = '';
  </script>
</body>
</html>
